name: Trading Bot CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  validate:
    name: Validate Python Application
    runs-on: windows-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt


      - name: Install Dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip

          pip install -r requirements.txt `
          --ignore-requires-python `
          || true

          pip install pandas numpy


      - name: Python Syntax Validation
        shell: pwsh
        run: |

          Get-ChildItem -Recurse -Filter *.py |
          ForEach-Object {

            python -m py_compile $_.FullName

            Write-Host "Validated: $($_.FullName)"
          }



  deploy:

    name: Deploy Trading Bot to Windows EC2

    runs-on: ubuntu-latest

    needs: validate

    if: github.ref == 'refs/heads/main'


    steps:

      - name: Checkout
        uses: actions/checkout@v4



      - name: Deploy Application
        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.EC2_HOST }}

          username: Administrator

          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            $ErrorActionPreference="Stop"


            cd C:\Users\Administrator\apps\remote


            echo "Saving current version..."

            git rev-parse HEAD > previous_commit.txt


            echo "Stopping trading bot..."

            taskkill /F /IM python.exe 2>$null || echo "No running bot"



            echo "Pulling latest code..."

            git pull origin main



            echo "Activating virtual environment..."

            if (!(Test-Path .venv)) {

                python -m venv .venv

            }


            .\.venv\Scripts\Activate.ps1



            echo "Installing dependencies..."

            pip install -r requirements.txt



            echo "Starting trading bot..."

            Start-Process python `
            -ArgumentList "main.py" `
            -WorkingDirectory "C:\Users\Administrator\apps\remote"



            echo "Waiting for application startup..."

            Start-Sleep -Seconds 30



            echo "Checking health..."

            try {

                Invoke-WebRequest `
                http://localhost:8000/health `
                -UseBasicParsing

                echo "Deployment successful"

            }

            catch {


                echo "Deployment failed"

                echo "Rolling back..."



                $commit = Get-Content previous_commit.txt


                git reset --hard $commit



                taskkill /F /IM python.exe 2>$null



                Start-Process python `
                -ArgumentList "main.py" `
                -WorkingDirectory "C:\Users\Administrator\apps\remote"



                exit 1

            }