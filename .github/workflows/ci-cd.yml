name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Python Code
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Install everything except MetaTrader5 (not available in CI)
          pip install -r requirements.txt --ignore-requires-python || true
          pip install pandas numpy

      - name: Check Syntax
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Filter *.py | ForEach-Object {
            python -m py_compile $_.FullName
            Write-Host "OK: $($_.FullName)"
          }

  deploy:
    name: Deploy to Windows EC2
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            cmd /c "
              cd /d C:\Users\Administrator\apps\remote &&
              git pull origin main &&
              taskkill /IM python.exe /F >nul 2>&1 || echo No process running &&
              start /B pythonw main.py
            "
