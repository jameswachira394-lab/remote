
name: Trading Bot Validation

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Verify Main Script Syntax
        run: python -m py_compile main.py

      - name: Verify All Python Files
        shell: powershell
        run: |
          Get-ChildItem -Recurse -Filter *.py | ForEach-Object {
            python -m py_compile $_.FullName
          }

      - name: Verify Imports
        run: |
          python -c "import core.signal_engine"
          python -c "import core.risk_manager"
          python -c "import core.data_feed"
          python -c "import mt5.connector"
          python -c "import mt5.order_executor"
          python -c "import mt5.position_manager"

      - name: Success
        run: echo "Validation completed successfully"
