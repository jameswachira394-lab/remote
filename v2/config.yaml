# ═══════════════════════════════════════════════════════════════
# config.yaml
# OB Trading System v2 — AWS EC2/Lambda Configuration
# Edit this file before running. All modules read from here.
# ═══════════════════════════════════════════════════════════════

# ── GENERAL ────────────────────────────────────────────────────
system:
  name: "OB_Trading_v2"
  version: "2.0.0"
  timezone: "UTC"               # All timestamps stored in UTC
  dry_run: true                 # true = no real orders sent
  log_level: "INFO"             # DEBUG | INFO | WARNING | ERROR

# ── DATA SOURCE ─────────────────────────────────────────────────
# Choose ONE: "mt5" | "ccxt" | "yfinance"
data_source: "ccxt"

mt5:
  path: "C:\\Program Files\\MetaTrader 5\\terminal64.exe"
  login: 10401216
  password: ":erBo0B{"
  server: "FBS-Demo"
  timeout: 10000
  pip_size: 0.01                # XAUUSD = 0.01, EURUSD = 0.0001
  magic_number: 202501
  slippage: 3
  comment: "OB_Bot_v2"
  retry_attempts: 3
  retry_delay_s: 1.0

ccxt:
  exchange: "binance"           # Any ccxt-supported exchange
  api_key: ""
  api_secret: ""
  sandbox: true                 # Use testnet / sandbox mode

yfinance:
  # No auth required — rate limited, use for testing only
  session_timeout: 10

# ── INSTRUMENTS ─────────────────────────────────────────────────
pairs:
  - symbol: "XAUUSD"
    pip_size: 0.01
    contract_size: 100
    sl_buffer_pips: 3
    digits: 2
  - symbol: "EURUSD"
    pip_size: 0.0001
    contract_size: 100000
    sl_buffer_pips: 2
    digits: 5
  - symbol: "GBPUSD"
    pip_size: 0.0001
    contract_size: 100000
    sl_buffer_pips: 2
    digits: 5

# ── TIMEFRAMES ───────────────────────────────────────────────────
timeframes:
  entry: "5m"                   # OB detection + signal entry
  structure: "15m"              # Swing highs/lows, BOS, CHoCH
  htf_bias: "1h"                # HTF bias determination

bars:
  entry: 1500                   # Bars to load for 5M
  structure: 800                # Bars to load for 15M
  htf_bias: 500                 # Bars to load for 1H

# ── ORDER BLOCK DETECTION ────────────────────────────────────────
ob:
  impulse_candles: 2            # Min consecutive same-dir candles for impulse
  bos_lookback: 5               # Swing lookback bars for BOS validation
  min_retest_gap: 5             # Min bars between OB formation and retest
  max_ob_age_bars: 300          # Discard OBs older than this many bars
  max_taps: 1                   # Max times OB can be retested before invalid
  body_ratio_min: 0.5           # Min body/range ratio for impulse candles

# ── STRUCTURE ANALYSIS ──────────────────────────────────────────
structure:
  swing_lookback: 3             # Bars each side to confirm swing high/low
  bos_confirmation: true        # Require candle close beyond swing level

# ── HTF BIAS ENGINE ─────────────────────────────────────────────
bias:
  hh_hl_count: 2                # Consecutive HH+HL to confirm BULLISH
  lh_ll_count: 2                # Consecutive LH+LL to confirm BEARISH
  update_interval_h: 1          # Recalculate every N hours

# ── SIGNAL FILTERS ──────────────────────────────────────────────
signal:
  min_rr: 2.0                   # Minimum RR to generate a signal
  sl_buffer_pips: 2             # Extra pips beyond OB extreme for SL
  tp_target: "next_swing"       # "next_swing" | "fixed_rr"
  fixed_rr: 3.0                 # Used if tp_target = fixed_rr

  # Confirmation inside OB (at least one must be true)
  require_confirmation: true
  wick_ratio: 0.60              # Wick must be >= 60% of candle range
  engulf: true                  # Accept engulfing candle
  internal_bos: true            # Accept internal 5M BOS inside OB

  # Session filter (UTC hours, inclusive)
  sessions:
    london:
      start: 8
      end: 12
    new_york:
      start: 13
      end: 17
    # Set enabled: false to disable session filter entirely
    enabled: true

# ── RISK MANAGEMENT ─────────────────────────────────────────────
risk:
  risk_pct: 0.5                 # % of balance risked per trade
  tp1_rr: 1.0                   # TP1 level (move BE here)
  tp2_rr: 2.0                   # TP2 level (full TP)
  move_be_at_tp1: true
  max_open_trades: 3
  max_daily_loss_pct: 3.0       # Halt if daily drawdown exceeds this
  trailing_stop_enabled: true
  trailing_stop_pips: 15

# ── DATABASE ────────────────────────────────────────────────────
database:
  # "sqlite" for local/EC2, "postgresql" for AWS RDS
  engine: "sqlite"

  sqlite:
    path: "data/ob_trading.db"

  postgresql:
    host: "your-rds-endpoint.amazonaws.com"
    port: 5432
    dbname: "ob_trading"
    user: "ob_user"
    password: ""
    sslmode: "require"

# ── ALERTS ──────────────────────────────────────────────────────
alerts:
  telegram:
    enabled: false
    token: ""
    chat_id: ""

  aws_sns:
    enabled: false
    topic_arn: "arn:aws:sns:us-east-1:123456789:ob-alerts"
    region: "us-east-1"

# ── SCHEDULER ──────────────────────────────────────────────────
scheduler:
  # "apscheduler" (EC2) | "lambda" (AWS Lambda + EventBridge)
  mode: "apscheduler"

  # APScheduler intervals
  data_fetch_interval_s: 60     # Fetch OHLCV every 60s (5M boundary)
  signal_check_interval_s: 60   # Run signal engine every 60s
  bias_update_interval_s: 3600  # Update HTF bias every hour
  position_check_s: 10          # Monitor open positions every 10s

# ── LOGGING ─────────────────────────────────────────────────────
logging:
  dir: "logs"
  backup_days: 14
  # CloudWatch (AWS EC2 only — requires awslogs agent)
  cloudwatch:
    enabled: false
    log_group: "/ob-trading/v2"
    region: "us-east-1"

# ── PATHS ───────────────────────────────────────────────────────
paths:
  data_dir: "data"
  log_dir: "logs"
  signal_dir: "signals"         # CSV signal output
